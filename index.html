<script>

const lt = document.getElementById("loading-text");
const cv = document.getElementById("unity-canvas");
const mw = document.getElementById("unity-mobile-warning");




const base = "https://cdn.jsdelivr.net/gh/woahhcrackers/BATIMWeb@main/Build/";
const name = "bender";




if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
  const m = document.createElement("meta");
  m.name = "viewport";
  m.content = "width=device-width,height=device-height,initial-scale=1,user-scalable=no";
  document.head.appendChild(m);
  mw.style.display = "block";
  setTimeout(() => mw.style.display = "none", 5000);

const ex = async u => {
  try { return (await fetch(u, { method: "HEAD" })).ok } catch { return false }
};

const parts = async ext => {
  const out = [];

  for (let i = 1; i < 100; i++) {
    const p = `${base}${name}.${ext}.${String(i).padStart(3,"0")}`;
    const r = await fetch(p, { method: "HEAD" });

    if (r.status !== 200) break;

    out.push(p);
  }

  return out;
};

const merge = async urls => {
  const bufs = await Promise.all(urls.map(u => fetch(u).then(r => r.arrayBuffer())));
  return URL.createObjectURL(new Blob(bufs));
};

(async () => {
  let data  = await merge(await parts("data"));

  let wasm = await merge(await parts("wasm"));

  const sc = document.createElement("script");
  sc.src = `${base}${name}.loader.js`;

  sc.onload = () => {
    createUnityInstance(cv, {
      dataUrl: data,
      frameworkUrl: `${base}${name}.framework.js`,
      codeUrl: wasm,
      streamingAssetsUrl: "StreamingAssets",
      companyName: "crackers",
